<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N2計算アプリ</title>
  
  <style>
      body {
          font-size: 18px;   /* ←スマホで見やすいサイズ */
      }

/* Chrome / Edge / Safari（WebKit系） */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
/* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

      /* 管サイズのプルダウン　サイズ設定 */
      select.pipe-size {
        height: 40px;      /* ←スマホで押しやすい高さ */
        font-size: 18px;   /* ←文字も大きく */
        width: 120px;   /* ←ここ好きなサイズに変更してOK */
      }

      /* 延長(m)の入力欄　サイズ設定 */
      input.length {
          position: relative;
          padding-right: 20px;
          height: 30px;
          width: 40px;
          font-size: 18px;
          text-align: right;
      }
      .length::after {
          content: "m";
          position: absolute;
          right: 6px;
          top: 50%;
          transform: translateY(-50%);
          color: #555;
      }
  
      /* 行追加ボタン・削除ボタン　見た目 */
      .actionBtn {
        margin-top: 15px;
        font-size: 18px;
        padding: 8px 10px;
      }

      /* 削除モードON　見た目 */
      .actionBtn.delete-on{
          background: #e66;
          color: #000;
      }
    
      /* 管サイズ選択　注意喚起 */
      .blink {
          animation: blinkAnim 0.8s infinite;
      }
      /* 合計　太文字 */
      #totalValue {
          font-weight: bold;
      }

      @keyframes blinkAnim {
          0% { background-color: #ffcccc; }
          50% { background-color: #ffffff; }
          100% { background-color: #ffcccc; }
      }
  
/* 各行ｍの表示 */
      .unit-m {
          margin-left: 4px;
      }
    
/* 各行容積単位の表示 */
      .unit-vol {
          margin-left: 4px;
          color: #555;
      }

/* 各行削除ボタン */
      .delRow {
      display: none;      /* ← 最初は隠す */
      margin-right: 5px;
      font-size: 22px;
      padding: 0px 0px;
      background: none;
      border: none;
      color: #d33;          /* ← 赤系で「削除」感を出す */
      cursor: pointer;
      }
      .row-controls{
          display: flex;
          gap: 10px;
          margin-bottom: 36px;
      }

      #result {
          margin-left: 18px;   /* ← 2文字ぶんの余白 */
      }  
    
      #bottomArea {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
      padding: 10px 15px;
      border-top: 2px solid #ccc;
      box-shadow: 0 -2px 6px rgba(0,0,0,0.1);
      }
      
    .testPress {
          width: 80px;        /* ←短く */
          height: 40px;       /* ←太く */
          font-size: 22px;    /* ←文字大きく */
          font-weight: bold;  /* ←太文字 */
          text-align: right;  /* ←数字を右寄せ */
      }
     
    #bottleCount {
          font-weight: bold;
          font-size: 24px;
      }

    .indoorInput {
        width: 60px;
        height: 36px;
        font-size: 20px;
        font-weight: bold;
        text-align: right;
      }

    #needN2 {
      font-weight: bold;
      font-size: 22px;
    }

    </style>
  
</head>
<body>
  
<div id="rows">
  <div class="row">
      <button class="delRow">✖</button> 
      <select class="pipe-size">
          <option value="" disabled selected style="color:#ccc;">サイズ</option>
          <option value="6.35">6.35φ</option>
          <option value="9.52">9.52φ</option>
          <option value="12.7">12.7φ</option>
          <option value="15.88">15.88φ</option>
          <option value="19.05">19.05φ</option>
          <option value="22.22">22.22φ</option>
          <option value="25.4">25.4φ</option>
          <option value="28.58">28.58φ</option>
          <option value="31.75">31.75φ</option>
          <option value="34.92">34.92φ</option>
          <option value="38.1">38.1φ</option>
          <option value="41.28">41.28φ</option>
          <option value="44.45">44.45φ</option>
          <option value="50.8">50.8φ</option>
      </select>
  
      <input type="number" class="length" placeholder="m">
      <span class="unit-m">m</span>
  
      <span class="ans"></span>
      <span class="unit-vol">m³</span>
  </div>

</div>

<!-- 行追加ボタン --> <!-- 行削除モード切替ボタン -->
  <div class="row-controls">
    <button id="addrow" class="actionBtn">行を追加</button>
    <button id="toggleDelete" class="actionBtn">行削除：OFF</button>
  </div>

<!-- 室内機 再数入力欄 -->
      <div id="undoorUnitArea">
          室内機（分流Ctrl等含む）:
              <input id="indoorCount" type="number" class="indoorInput"> 台
      </div>
    
<!-- 結果表示エリアと合計ボタン -->
      <div id="bottomArea">
          <div id="result">
              配管内容積合計：<span id="totalValue">0</span> m³
      </div>

<!-- 機器等内容積合計 -->
          <div>
              機器等内容積合計：<span id="indoorTotal">0</span> m³
          </div>

<!-- 総内容積合計 -->
          <div>
              総内容積合計：<span id="totalVolume">0</span> m³
          </div>

<!-- 試験圧力（MPa）　入力欄 -->
      耐圧試験圧力（Mpa）:<input id="testPressure" class="testPress" type="number" step="0.1">

<!-- 必要窒素量の表示欄 -->
        <div id="needN2Area">
            必要窒素量：<span id="needN2">0.00</span> Nm³
        </div>

<!-- 必要ボンベ本数 -->
      <div id="bottleArea">
          必要ボンベ本数:<span id="bottleCount">0</span> 本
      </div>
  </div>

<!-- 全行削除時のテンプレート -->
    <div id="originalRow" class="row" style="display:none;">
    <button class="delRow">✖</button> 
    <select class="pipe-size">
        <option value="" disabled selected style="color:#ccc;">サイズ</option>
        <option value="6.35">6.35φ</option>
        <option value="9.52">9.52φ</option>
        <option value="12.7">12.7φ</option>
        <option value="15.88">15.88φ</option>
        <option value="19.05">19.05φ</option>
        <option value="22.22">22.22φ</option>
        <option value="25.4">25.4φ</option>
        <option value="28.58">28.58φ</option>
        <option value="31.75">31.75φ</option>
        <option value="34.92">34.92φ</option>
        <option value="38.1">38.1φ</option>
        <option value="41.28">41.28φ</option>
        <option value="44.45">44.45φ</option>
        <option value="50.8">50.8φ</option>
    </select>

    <input type="number" class="length" placeholder="m">
    <span class="unit-m">m</span>

    <span class="ans"></span>
    <span class="unit-vol">m³</span>
</div>
 
<script>

// モード切替
    let deleteMode = false;
    
    document.getElementById("toggleDelete").addEventListener("click", () => {
        deleteMode = !deleteMode;
    
// ボタンの表示切替
        document.getElementById("toggleDelete").textContent =
            deleteMode ? "行削除：ON" : "行削除：OFF";

// ★ 削除モードONのとき赤くする
        document.getElementById("toggleDelete").classList.toggle("delete-on", deleteMode);      
        
// 全ての行の ✖ ボタンをON/OFF
        document.querySelectorAll(".delRow").forEach(btn => {
            btn.style.display = deleteMode ? "inline-block" : "none";
        });
    });
  
// 各行削除
        document.addEventListener("click", (e) => {
           if (e.target.classList.contains("delRow")) {
               const row = e.target.closest(".row");
               row.remove();
               calcTotalVolume();   // ← リアルタイム合計計算　追加！
           }
      });
        
// 1mあたりの内容積テーブル
        const pipeTable = {
          "6.35":  { volume1m: 0.000022 },
          "9.52":  { volume1m: 0.000050 },
          "12.7":  { volume1m: 0.000090 },
          "15.88": { volume1m: 0.000143 },
          "19.05": { volume1m: 0.000206 },
          "22.22": { volume1m: 0.000284 },
          "25.4":  { volume1m: 0.000374 },
          "28.58": { volume1m: 0.000472 },
          "31.75": { volume1m: 0.000582 },
          "34.92": { volume1m: 0.000707 },
          "38.1":  { volume1m: 0.000845 },
          "41.28": { volume1m: 0.000998 },
          "44.45": { volume1m: 0.001163 },
          "50.8":  { volume1m: 0.001500 }
        };

// 行の内容積を計算する
          function calcThisRowVolume(row) {
              const pipeSize = row.querySelector(".pipe-size").value;
              const length = Number(row.querySelector(".length").value);
          
              if (pipeSize && length) {
                  const volume = pipeTable[pipeSize].volume1m * length;
                  row.querySelector(".ans").textContent = volume.toFixed(6);
              } else {
                  row.querySelector(".ans").textContent = "";
              }
                  calcTotalVolume();   // ← これ追加！リアルタイム更新
          }

// 延長が変わったらその行を計算
          document.addEventListener("input", (e) => {
              if (e.target.classList.contains("length")) {
                  const row = e.target.closest(".row");
                  calcThisRowVolume(row);
              }
          });

// 管サイズが変わったらその行を計算
          document.addEventListener("change", (e) => {
              if (e.target.classList.contains("pipe-size")) {
                  const row = e.target.closest(".row");
                  calcThisRowVolume(row);
              }
          });

// 行追加ボタン
document.getElementById("addrow").addEventListener("click", () => {
    const rows = document.querySelectorAll("#rows .row");
    let newRow;

    if (rows.length === 0) {
        // ★ 全行削除後は「元のHTMLにある最初の行」を再生成する
        const original = document.querySelector("#originalRow"); 
        newRow = original.cloneNode(true);
        newRow.style.display = "";
    } else {
        // 通常は前行を計算してから複製
        const prevRow = rows[rows.length - 1];
        calcThisRowVolume(prevRow);

        const firstRow = rows[0];
        newRow = firstRow.cloneNode(true);
    }

// 初期化
    newRow.querySelector(".pipe-size").value = "";
    newRow.querySelector(".length").value = "";
    newRow.querySelector(".ans").textContent = "";
    newRow.querySelector(".delRow").style.display =
        deleteMode ? "inline-block" : "none";

    document.getElementById("rows").appendChild(newRow);

    calcTotalVolume();
});

// 延長欄タップ時のチェック
          document.addEventListener("focusin", (e) => {
              if (!e.target.classList.contains("length")) return;
          
              const row = e.target.closest(".row");
              const pipeSize = row.querySelector(".pipe-size").value;
          
              if (!pipeSize) {
                  alert("管サイズを選択してください");
                  row.querySelector(".pipe-size").focus();
              }
          });

  // 合計の計算
          function calcTotalVolume() {
            const rows = document.querySelectorAll("#rows .row");
            let total = 0;
          
            rows.forEach(row => {
                 const pipeSize = row.querySelector(".pipe-size").value;
                 const length = Number(row.querySelector(".length").value);
            
                 if (pipeSize && length) {
                        total += pipeTable[pipeSize].volume1m * length;
                  }
             });
          
             // 配管内容積の表示
             document.getElementById("totalValue").textContent = pipeTotal.toFixed(6);
            
             // ★ 室内機内容積
             const indoorVol = calcIndoorVolume();
             document.getElementById("indoorTotal").textContent = indoorVol.toFixed(6);
            
             // ★ 総内容積
             const totalVolume = pipeTotal + indoorVol;
             document.getElementById("totalVolume").textContent = totalVolume.toFixed(6);
            
             // ★ 必要窒素量（Nm³）
             const needN2 = calcNeedN2(totalVolume);
             document.getElementById("needN2").textContent = needN2.toFixed(2);
            
             // ★ ボンベ本数
             const bottleCount = calcBottleCount(totalVolume);
             document.getElementById("bottleCount").textContent = bottleCount;
            }

// 必要窒素量（Nm3）を計算
            function calcNeedN2(totalVolume) {
                const testGauge = Number(document.getElementById("testPressure").value);
                if (isNaN(testGauge) || testGauge <= 0) return 0;
            
                const p_abs = testGauge + 0.1;   // 絶対圧
                return totalVolume * (p_abs / 0.1);
            }

// ★ 本数計算を追加（呼び出し）
                    const bottleCount = calcBottleCount(total);
                    document.getElementById("bottleCount").textContent = bottleCount;
          }  

// 絶対圧力の計算
         function calcEffectiveBottleVolume() {
            const nominal = 7;        // 公称容量（Nm³）
            const p_init = 14.8;      // 初期圧力（MPa abs）

            const testGauge = Number(document.getElementById("testPressure").value);
            if (isNaN(testGauge) || testGauge <= 0) return 0;

            const p_limit = testGauge + 0.1;   // 絶対圧に変換
           
// ★ ボンベを「14.8 → p_limit」まで使ったときのガス量
            const usable = nominal * ((p_init - p_limit) / p_init);

            return usable;
          }

// 本数の計算
              function calcBottleCount(totalVolume) {
                  const effective = calcEffectiveBottleVolume();
                  if (effective <= 0) return 0;

                  const raw = totalVolume / effective;

    // ★ 小数点3位で切り上げ
                  const rounded3 = Math.ceil(raw * 1000) / 1000;

    // ★ 表示は小数点2位
                  return rounded3.toFixed(2);
              }


// 試験圧力入力後　再計算
             const testInput = document.getElementById("testPressure");

            testInput.addEventListener("input", () => {
                const v = Number(testInput.value);
                if (v > 0) {
                  calcTotalVolume();
                }
              });

</script>

</body>
</html>
