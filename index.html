<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>N2計算アプリ</title>
  
  <style>
      body {
          font-size: 18px;   /* ←スマホで見やすいサイズ */
      }

      /* 管サイズのプルダウン　サイズ設定 */
      select.pipe-size {
        height: 40px;      /* ←スマホで押しやすい高さ */
        font-size: 18px;   /* ←文字も大きく */
        width: 140px;   /* ←ここ好きなサイズに変更してOK */
      }

      /* 延長(m)の入力欄　サイズ設定 */
      input.length {
           position: relative;
           padding-right: 20px;
}
      .length::after {
          content: "m";
          position: absolute;
          right: 6px;
          top: 50%;
          transform: translateY(-50%);
          color: #555;
          height: 40px;      /* ←スマホで押しやすい高さ */
          font-size: 18px;   /* ←文字も大きく */
          width: 100px;    /* ←ここも好きに調整できる */
    }
  
      /* 行追加ボタン */
      #addRow {
        margin-top: 15px;
        font-size: 18px;
        padding: 8px 15px;
    }
      /* 管サイズ選択　注意喚起 */
      .blink {
          animation: blinkAnim 0.8s infinite;
}

      @keyframes blinkAnim {
          0% { background-color: #ffcccc; }
          50% { background-color: #ffffff; }
          100% { background-color: #ffcccc; }
}
      /* 各行ｍの表示 */
      .unit-m {
          margin-left: 4px;
}
    
      /* 各行容積単位の表示 */
      .unit-vol {
          margin-left: 4px;
          color: #555;
}

    </style>
  
</head>
<body>
  
<div id="rows">
  <div class="row">
    <select class="pipe-size">
      <option value="" disabled selected style="color:#ccc;">管サイズ</option>
      <option value="6.35">6.35φ</option>
      <option value="9.52">9.52φ</option>
      <option value="12.7">12.7φ</option>
      <option value="15.88">15.88φ</option>
      <option value="19.05">19.05φ</option>
      <option value="22.22">22.22φ</option>
      <option value="25.4">25.4φ</option>
      <option value="28.58">28.58φ</option>
      <option value="31.75">31.75φ</option>
      <option value="34.92">34.92φ</option>
      <option value="38.1">38.1φ</option>
      <option value="41.28">41.28φ</option>
      <option value="44.45">44.45φ</option>
      <option value="50.8">50.8φ</option>
    </select>
    
    <input type="number" class="length" placeholder="m">
    <span class="unit-m">m</span>

    <!-- この行の内容積を表示する場所 -->
    <span class="ans"></span><span class="unit-vol">m³</span>
    <span class="unit-vol">m³</span>

  </div>
</div>

<!-- 行追加ボタン -->
  <button id="addRow">＋ 行を追加</button>

<!-- 結果表示エリアと合計ボタン -->
  <div id="result">内容積合計：0 m³</div>
  <button id="calc">計算する</button>

<!-- 行追加ボタンのJS -->
<script>
    document.getElementById("addRow").addEventListener("click", () => {
        const rows = document.querySelectorAll("#rows .row");
    
        // ① 前行（最後の行）だけ内容積を計算して Ans 表示
        const prevRow = rows[rows.length - 1];
        const pipeSize = prevRow.querySelector(".pipe-size").value;
        const length = Number(prevRow.querySelector(".length").value);
    
        if (pipeSize && length) {
            const volume = calcVolume(pipeSize, length);
            prevRow.querySelector(".ans").textContent = volume.toFixed(6);
        } else {
            prevRow.querySelector(".ans").textContent = "";
        }
    
        // ② 新しい行を追加（初期値は全部空）
        const firstRow = rows[0];
        const newRow = firstRow.cloneNode(true);
    
        newRow.querySelector(".pipe-size").value = "";
        newRow.querySelector(".length").value = "";
        newRow.querySelector(".ans").textContent = ""; // ← 初期値は空欄
    
        document.getElementById("rows").appendChild(newRow);
});

    //管サイズの内容積（ｍ3/ｍ）
    const pipeTable = {
      "6.35":  { volume1m: 0.000022 },
      "9.52":  { volume1m: 0.000050 },
      "12.7":  { volume1m: 0.000090 },
      "15.88": { volume1m: 0.000143 },
      "19.05": { volume1m: 0.000206 },
      "22.22": { volume1m: 0.000284 },
      "25.4":  { volume1m: 0.000374 },
      "28.58": { volume1m: 0.000472 },
      "31.75": { volume1m: 0.000582 },
      "34.92": { volume1m: 0.000707 },
      "38.1":  { volume1m: 0.000845 },
      "41.28": { volume1m: 0.000998 },
      "44.45": { volume1m: 0.001163 },
      "50.8":  { volume1m: 0.001500 }
};
  　//行ごとの内容積の計算
    function calcVolume(pipeSize, length) {
      if (!pipeSize || !length) return 0;
  
    const data = pipeTable[pipeSize];
      return data.volume1m * length;
}

    // 各行 内容積計算（前行のみ計算）
    function calcPrevRowVolume() {
        const rows = document.querySelectorAll("#rows .row");
        if (rows.length < 1) return;
    
        const prevRow = rows[rows.length - 1];
        const pipeSize = prevRow.querySelector(".pipe-size").value;
        const length = Number(prevRow.querySelector(".length").value);
    
        if (pipeSize && length) {
            const volume = calcVolume(pipeSize, length);
            prevRow.querySelector(".ans").textContent = volume.toFixed(6);
        } else {
            prevRow.querySelector(".ans").textContent = "";
        }
    }

// 延長が変わったら計算
    document.addEventListener("input", (e) => {
        if (e.target.classList.contains("length")) {
                calcPrevRowVolume();
        }
});

// 管サイズが変わったら計算
    document.addEventListener("change", (e) => {
        if (e.target.classList.contains("pipe-size")) {
            calcPrevRowVolume();
        }
});

    // 行追加を押したときにも
    document.getElementById("addRow").addEventListener("click", () => {
        calcPrevRowVolume(); // ← まず前行を計算
    
        const rows = document.querySelectorAll("#rows .row");
        const firstRow = rows[0];
        const newRow = firstRow.cloneNode(true);
    
        newRow.querySelector(".pipe-size").value = "";
        newRow.querySelector(".length").value = "";
        newRow.querySelector(".ans").textContent = "";
    
        document.getElementById("rows").appendChild(newRow);
});
  
    // 入力欄の記入チェック
    document.addEventListener("focusin", (e) => {
        if (!e.target.classList.contains("length")) return;
    
        const row = e.target.closest(".row");
        const pipeSize = row.querySelector(".pipe-size").value;
    
        if (!pipeSize) {
            alert("管サイズを選択してください");
            row.querySelector(".pipe-size").focus();
        }
});

    //全行の合計内容積の計算
    document.getElementById("calc").addEventListener("click", () => {
      const rows = document.querySelectorAll("#rows .row");
      let totalVolume = 0;
    
      rows.forEach(row => {
        const pipeSize = row.querySelector(".pipe-size").value;
        const length = Number(row.querySelector(".length").value);
    
        totalVolume += calcVolume(pipeSize, length);
      });
    
      document.getElementById("result").textContent =
        `内容積合計：${totalVolume.toFixed(6)} m³`;
});

</script>

</body>
</html>
